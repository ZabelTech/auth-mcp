name: tests

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # Install the package + its host-provided runtime surface (mcp/starlette via the
      # FastAPI pin) so the suite runs against the same starlette the hosts ship.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Hermetic unittest suite — no network: every test injects an in-memory key and a
      # mutable config provider via mcp_oauth.configure().
      - name: Run tests
        run: python -m unittest discover -s tests -v
